<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY SPECIAL SITE</title>
    <style>
        /* 全体のデザイン（近未来・ダークモード） */
        body { 
            background-color: #0b0e14; 
            color: #ffffff; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 50px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1c2128;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: #58a6ff; font-size: 2.5rem; }
        p { color: #8b949e; line-height: 1.6; }

        /* 入力エリア */
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            outline: none;
        }

        /* ボタンのデザイン */
        .btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover { background-color: #2ea043; transform: scale(1.05); }

        /* 秘密のエリア（最初は隠しておく） */
        #secret-area {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #21262d;
            border-left: 5px solid #d29922;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My World</h1>
        <p>ここは、俺がコードで作り上げた自分専用のページや。</p>
        
        <!-- 名前の入力欄 -->
        <input type="text" id="nameInput" placeholder="君の名前を教えて">
        <br>
        <button class="btn" onclick="updateSite()">世界を更新する</button>

        <!-- 秘密のメッセージエリア -->
        <div id="secret-area">
            <h2 id="welcomeMsg"></h2>
            <p>GitHubで回避サイトを探すより、こうやってコードを書くほうが100倍面白いな！</p>
        </div>
    </div>

    <script>
        function updateSite() {
            const name = document.getElementById('nameInput').value;
            if (name === "") {
                alert("名前を入れてくれな始まらんで！");
                return;
            }

            // 画面を書き換える命令
            document.getElementById('welcomeMsg').innerText = "ようこそ、" + name + "！";
            document.getElementById('secret-area').style.display = "block";
            
            // 背景色をちょっと変えて「変わった感」を出す
            document.body.style.backgroundColor = "#000d1a";
        }
    </script>

</body>
</html>
